# Simple workflow for deploying static content to GitHub Pages
name: Deploy Next.js to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout
        uses: actions/checkout@cb473e580fc5134705b46b9a302927205164f98d

      - name: Setup Node
        uses: actions/setup-node@39370e3970a6d050c482ff758455857211136d8f
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "./frontend/package-lock.json"

      - name: Setup Pages
        uses: actions/configure-pages@983d7736d9b9991206f0e213388716b7f3ba9e46

      - name: Install dependencies
        run: npm ci

      - name: Build with Next.js
        run: npm run build

      - name: Static Diagnostics
        run: |
          echo "Listing build output directory (frontend/out):"
          ls -R ./out
          touch ./out/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e7420265d71ea16e16f866405786412f
        with:
          path: ./frontend/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164db6242308728a45e771e8093b707447
